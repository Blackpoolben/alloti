version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - alloti_data:/data
    environment:
      - PLANTNET_API_KEY=2b10f9eTDgVF6DKZVwr2m73ZMe
      - DB_PATH=/data/alloti.db
      - FLASK_DEBUG=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  alloti_data:
